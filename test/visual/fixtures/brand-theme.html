<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brand Themes — Visual Regression</title>
  <link rel="stylesheet" href="../../../build/css/base.css">
  <link rel="stylesheet" href="../../../build/css/themes/brand-a.css">
  <link rel="stylesheet" href="../../../build/css/themes/brand-b.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #fff; padding: 24px; }
    h2 { font-size: 14px; color: #666; margin: 24px 0 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    .brand-panel { padding: 24px; border-radius: 12px; margin-bottom: 16px; }
    .row { display: flex; gap: 4px; margin-bottom: 8px; }
    .swatch { width: 48px; height: 48px; border-radius: 6px; border: 1px solid rgba(0,0,0,0.08); }
    .label { font-size: 11px; color: #999; margin-bottom: 4px; }
    .card { padding: 16px; border-radius: 8px; display: inline-block; margin-right: 8px; margin-bottom: 8px; color: #fff; font-size: 14px; font-weight: 600; }
  </style>
</head>
<body>
  <!-- BrandA -->
  <h2>BrandA</h2>
  <div class="brand-panel" data-brand="brand-a" style="background: var(--colors-foundation-neutral-whisper, #f8f8f8)">
    <div class="label">Brand colors</div>
    <div class="row">
      <div class="swatch" style="background: var(--colors-foundation-brand-faint)"></div>
      <div class="swatch" style="background: var(--colors-foundation-brand-subtle)"></div>
      <div class="swatch" style="background: var(--colors-foundation-brand-soft)"></div>
      <div class="swatch" style="background: var(--colors-foundation-brand-light)"></div>
      <div class="swatch" style="background: var(--colors-foundation-brand-base)"></div>
      <div class="swatch" style="background: var(--colors-foundation-brand-medium)"></div>
      <div class="swatch" style="background: var(--colors-foundation-brand-strong)"></div>
      <div class="swatch" style="background: var(--colors-foundation-brand-bold)"></div>
      <div class="swatch" style="background: var(--colors-foundation-brand-heavy)"></div>
    </div>
    <div class="label">Accent 1</div>
    <div class="row">
      <div class="swatch" style="background: var(--colors-foundation-accent-1-faint)"></div>
      <div class="swatch" style="background: var(--colors-foundation-accent-1-subtle)"></div>
      <div class="swatch" style="background: var(--colors-foundation-accent-1-soft)"></div>
      <div class="swatch" style="background: var(--colors-foundation-accent-1-light)"></div>
      <div class="swatch" style="background: var(--colors-foundation-accent-1-base)"></div>
      <div class="swatch" style="background: var(--colors-foundation-accent-1-medium)"></div>
      <div class="swatch" style="background: var(--colors-foundation-accent-1-strong)"></div>
      <div class="swatch" style="background: var(--colors-foundation-accent-1-bold)"></div>
      <div class="swatch" style="background: var(--colors-foundation-accent-1-heavy)"></div>
    </div>
    <div class="label">Accent 2</div>
    <div class="row">
      <div class="swatch" style="background: var(--colors-foundation-accent-2-faint)"></div>
      <div class="swatch" style="background: var(--colors-foundation-accent-2-subtle)"></div>
      <div class="swatch" style="background: var(--colors-foundation-accent-2-soft)"></div>
      <div class="swatch" style="background: var(--colors-foundation-accent-2-light)"></div>
      <div class="swatch" style="background: var(--colors-foundation-accent-2-base)"></div>
      <div class="swatch" style="background: var(--colors-foundation-accent-2-medium)"></div>
      <div class="swatch" style="background: var(--colors-foundation-accent-2-bold)"></div>
    </div>
    <div class="label">UI samples</div>
    <div class="card" style="background: var(--colors-foundation-brand-default)">Primary Button</div>
    <div class="card" style="background: var(--colors-foundation-accent-1-default)">Accent 1</div>
    <div class="card" style="background: var(--colors-foundation-accent-2-default)">Accent 2</div>
    <div class="card" style="background: var(--colors-foundation-neutral-strong); color: var(--colors-foundation-neutral-white)">Neutral</div>
  </div>

  <!-- BrandB -->
  <h2>BrandB</h2>
  <div class="brand-panel" data-brand="brand-b" style="background: var(--colors-foundation-neutral-whisper, #f8f8f8)">
    <div class="label">Brand colors</div>
    <div class="row">
      <div class="swatch" style="background: var(--colors-foundation-brand-faint)"></div>
      <div class="swatch" style="background: var(--colors-foundation-brand-subtle)"></div>
      <div class="swatch" style="background: var(--colors-foundation-brand-soft)"></div>
      <div class="swatch" style="background: var(--colors-foundation-brand-light)"></div>
      <div class="swatch" style="background: var(--colors-foundation-brand-base)"></div>
      <div class="swatch" style="background: var(--colors-foundation-brand-medium)"></div>
      <div class="swatch" style="background: var(--colors-foundation-brand-strong)"></div>
      <div class="swatch" style="background: var(--colors-foundation-brand-bold)"></div>
      <div class="swatch" style="background: var(--colors-foundation-brand-heavy)"></div>
    </div>
    <div class="label">Accent 1</div>
    <div class="row">
      <div class="swatch" style="background: var(--colors-foundation-accent-1-faint)"></div>
      <div class="swatch" style="background: var(--colors-foundation-accent-1-subtle)"></div>
      <div class="swatch" style="background: var(--colors-foundation-accent-1-soft)"></div>
      <div class="swatch" style="background: var(--colors-foundation-accent-1-light)"></div>
      <div class="swatch" style="background: var(--colors-foundation-accent-1-base)"></div>
      <div class="swatch" style="background: var(--colors-foundation-accent-1-medium)"></div>
      <div class="swatch" style="background: var(--colors-foundation-accent-1-strong)"></div>
      <div class="swatch" style="background: var(--colors-foundation-accent-1-bold)"></div>
      <div class="swatch" style="background: var(--colors-foundation-accent-1-heavy)"></div>
    </div>
    <div class="label">Accent 2</div>
    <div class="row">
      <div class="swatch" style="background: var(--colors-foundation-accent-2-faint)"></div>
      <div class="swatch" style="background: var(--colors-foundation-accent-2-subtle)"></div>
      <div class="swatch" style="background: var(--colors-foundation-accent-2-soft)"></div>
      <div class="swatch" style="background: var(--colors-foundation-accent-2-light)"></div>
      <div class="swatch" style="background: var(--colors-foundation-accent-2-base)"></div>
      <div class="swatch" style="background: var(--colors-foundation-accent-2-medium)"></div>
      <div class="swatch" style="background: var(--colors-foundation-accent-2-bold)"></div>
    </div>
    <div class="label">UI samples</div>
    <div class="card" style="background: var(--colors-foundation-brand-default)">Primary Button</div>
    <div class="card" style="background: var(--colors-foundation-accent-1-default)">Accent 1</div>
    <div class="card" style="background: var(--colors-foundation-accent-2-default)">Accent 2</div>
    <div class="card" style="background: var(--colors-foundation-neutral-strong); color: var(--colors-foundation-neutral-white)">Neutral</div>
  </div>
</body>
</html>
