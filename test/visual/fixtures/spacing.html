<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spacing Scale — Visual Regression</title>
  <link rel="stylesheet" href="../../../build/css/base.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #fff; padding: 24px; }
    h2 { font-size: 14px; color: #666; margin: 16px 0 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    .scale { display: flex; flex-direction: column; gap: 6px; }
    .bar-row { display: flex; align-items: center; gap: 12px; }
    .bar { height: 20px; background: var(--colors-blue-500, #5286ff); border-radius: 3px; }
    .label { font-size: 12px; color: #999; width: 60px; text-align: right; flex-shrink: 0; }
  </style>
</head>
<body>
  <h2>Spacing</h2>
  <div class="scale">
    <div class="bar-row"><span class="label">0</span><div class="bar" style="width: var(--dimensions-spacing-0)"></div></div>
    <div class="bar-row"><span class="label">0.5</span><div class="bar" style="width: var(--dimensions-spacing-0-5)"></div></div>
    <div class="bar-row"><span class="label">1</span><div class="bar" style="width: var(--dimensions-spacing-1)"></div></div>
    <div class="bar-row"><span class="label">1.5</span><div class="bar" style="width: var(--dimensions-spacing-1-5)"></div></div>
    <div class="bar-row"><span class="label">2</span><div class="bar" style="width: var(--dimensions-spacing-2)"></div></div>
    <div class="bar-row"><span class="label">2.5</span><div class="bar" style="width: var(--dimensions-spacing-2-5)"></div></div>
    <div class="bar-row"><span class="label">3</span><div class="bar" style="width: var(--dimensions-spacing-3)"></div></div>
    <div class="bar-row"><span class="label">3.5</span><div class="bar" style="width: var(--dimensions-spacing-3-5)"></div></div>
    <div class="bar-row"><span class="label">4</span><div class="bar" style="width: var(--dimensions-spacing-4)"></div></div>
    <div class="bar-row"><span class="label">5</span><div class="bar" style="width: var(--dimensions-spacing-5)"></div></div>
    <div class="bar-row"><span class="label">6</span><div class="bar" style="width: var(--dimensions-spacing-6)"></div></div>
    <div class="bar-row"><span class="label">7</span><div class="bar" style="width: var(--dimensions-spacing-7)"></div></div>
    <div class="bar-row"><span class="label">8</span><div class="bar" style="width: var(--dimensions-spacing-8)"></div></div>
    <div class="bar-row"><span class="label">9</span><div class="bar" style="width: var(--dimensions-spacing-9)"></div></div>
    <div class="bar-row"><span class="label">10</span><div class="bar" style="width: var(--dimensions-spacing-10)"></div></div>
    <div class="bar-row"><span class="label">11</span><div class="bar" style="width: var(--dimensions-spacing-11)"></div></div>
    <div class="bar-row"><span class="label">12</span><div class="bar" style="width: var(--dimensions-spacing-12)"></div></div>
    <div class="bar-row"><span class="label">14</span><div class="bar" style="width: var(--dimensions-spacing-14)"></div></div>
    <div class="bar-row"><span class="label">16</span><div class="bar" style="width: var(--dimensions-spacing-16)"></div></div>
    <div class="bar-row"><span class="label">20</span><div class="bar" style="width: var(--dimensions-spacing-20)"></div></div>
  </div>

  <h2>Sizing</h2>
  <div class="scale">
    <div class="bar-row"><span class="label">0</span><div class="bar" style="width: var(--dimensions-sizing-size-0)"></div></div>
    <div class="bar-row"><span class="label">0.5</span><div class="bar" style="width: var(--dimensions-sizing-size-0-5)"></div></div>
    <div class="bar-row"><span class="label">1</span><div class="bar" style="width: var(--dimensions-sizing-size-1)"></div></div>
    <div class="bar-row"><span class="label">2</span><div class="bar" style="width: var(--dimensions-sizing-size-2)"></div></div>
    <div class="bar-row"><span class="label">3</span><div class="bar" style="width: var(--dimensions-sizing-size-3)"></div></div>
    <div class="bar-row"><span class="label">4</span><div class="bar" style="width: var(--dimensions-sizing-size-4)"></div></div>
    <div class="bar-row"><span class="label">5</span><div class="bar" style="width: var(--dimensions-sizing-size-5)"></div></div>
    <div class="bar-row"><span class="label">6</span><div class="bar" style="width: var(--dimensions-sizing-size-6)"></div></div>
    <div class="bar-row"><span class="label">8</span><div class="bar" style="width: var(--dimensions-sizing-size-8)"></div></div>
    <div class="bar-row"><span class="label">10</span><div class="bar" style="width: var(--dimensions-sizing-size-10)"></div></div>
  </div>

  <h2>Border Radius</h2>
  <div style="display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px;">
    <div style="width: 64px; height: 64px; background: var(--colors-blue-200, #d1e0fd); border-radius: var(--borders-border-radius-rounded-none)"></div>
    <div style="width: 64px; height: 64px; background: var(--colors-blue-200, #d1e0fd); border-radius: var(--borders-border-radius-rounded-xs)"></div>
    <div style="width: 64px; height: 64px; background: var(--colors-blue-200, #d1e0fd); border-radius: var(--borders-border-radius-rounded-sm)"></div>
    <div style="width: 64px; height: 64px; background: var(--colors-blue-200, #d1e0fd); border-radius: var(--borders-border-radius-rounded-md)"></div>
    <div style="width: 64px; height: 64px; background: var(--colors-blue-200, #d1e0fd); border-radius: var(--borders-border-radius-rounded-lg)"></div>
    <div style="width: 64px; height: 64px; background: var(--colors-blue-200, #d1e0fd); border-radius: var(--borders-border-radius-rounded-xl)"></div>
    <div style="width: 64px; height: 64px; background: var(--colors-blue-200, #d1e0fd); border-radius: var(--borders-border-radius-rounded-2xl)"></div>
    <div style="width: 64px; height: 64px; background: var(--colors-blue-200, #d1e0fd); border-radius: var(--borders-border-radius-rounded-full)"></div>
  </div>
</body>
</html>
