<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Palette — Visual Regression</title>
  <link rel="stylesheet" href="../../../build/css/base.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #fff; padding: 24px; }
    h2 { font-size: 14px; color: #666; margin: 16px 0 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    .row { display: flex; gap: 4px; margin-bottom: 12px; }
    .swatch { width: 48px; height: 48px; border-radius: 6px; border: 1px solid rgba(0,0,0,0.08); }
  </style>
</head>
<body>
  <h2>Grey</h2>
  <div class="row">
    <div class="swatch" style="background: var(--colors-grey-50)"></div>
    <div class="swatch" style="background: var(--colors-grey-100)"></div>
    <div class="swatch" style="background: var(--colors-grey-200)"></div>
    <div class="swatch" style="background: var(--colors-grey-300)"></div>
    <div class="swatch" style="background: var(--colors-grey-400)"></div>
    <div class="swatch" style="background: var(--colors-grey-500)"></div>
    <div class="swatch" style="background: var(--colors-grey-600)"></div>
    <div class="swatch" style="background: var(--colors-grey-700)"></div>
    <div class="swatch" style="background: var(--colors-grey-800)"></div>
    <div class="swatch" style="background: var(--colors-grey-900)"></div>
  </div>

  <h2>Blue</h2>

    <div class="swatch" style="background: var(--colors-blue-500)"></div>
    <div class="swatch" style="background: var(--colors-blue-600)"></div>
    <div class="swatch" style="background: var(--colors-blue-700)"></div>
    <div class="swatch" style="background: var(--colors-blue-800)"></div>
    <div class="swatch" style="background: var(--colors-blue-900)"></div>
  </div>

  <h2>Green</h2>
  <div class="row">
    <div class="swatch" style="background: var(--colors-green-100)"></div>
    <div class="swatch" style="background: var(--colors-green-200)"></div>
    <div class="swatch" style="background: var(--colors-green-300)"></div>
    <div class="swatch" style="background: var(--colors-green-400)"></div>
    <div class="swatch" style="background: var(--colors-green-500)"></div>
    <div class="swatch" style="background: var(--colors-green-600)"></div>
    <div class="swatch" style="background: var(--colors-green-700)"></div>
    <div class="swatch" style="background: var(--colors-green-800)"></div>

    <div class="swatch" style="background: var(--colors-red-400)"></div>
    <div class="swatch" style="background: var(--colors-red-500)"></div>
    <div class="swatch" style="background: var(--colors-red-600)"></div>
    <div class="swatch" style="background: var(--colors-red-700)"></div>
    <div class="swatch" style="background: var(--colors-red-800)"></div>

  <h2>Orange</h2>
  <div class="row">
    <div class="swatch" style="background: var(--colors-orange-100)"></div>

    <div class="swatch" style="background: var(--colors-yellow-900)"></div>

</body>
</html>
